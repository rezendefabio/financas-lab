name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validar Maven Wrapper
        run: ./mvnw --version

      - name: Build com testes
        # Testcontainers sobe Postgres real para testes de integracao.
        # Docker disponivel por padrao no runner ubuntu-latest.
        run: ./mvnw verify

      # JaCoCo report gerado pelo mvnw verify via plugin JaCoCo.
      - name: Upload relatorio JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn
